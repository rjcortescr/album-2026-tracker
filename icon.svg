<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14523f"/>
      <stop offset="100%" stop-color="#052619"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4c659"/>
      <stop offset="100%" stop-color="#d4a437"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Cromo dorado centrado, proporcionado -->
  <g transform="translate(256, 256)">
    <!-- Sombra suave -->
    <rect x="-114" y="-150" width="232" height="304" rx="20" fill="#000000" fill-opacity="0.35"/>
    <!-- Cromo -->
    <rect x="-120" y="-156" width="232" height="304" rx="20" fill="url(#gold)"/>
    <!-- Marco interior brillante -->
    <rect x="-108" y="-144" width="208" height="280" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2.5"/>

    <!-- Trofeo del Mundial centrado dentro del cromo -->
    <g fill="#052619" transform="translate(-4, -10)">
      <!-- Copa principal -->
      <path d="M -48 -60
               Q -48 -10, -22 10
               L -22 50
               L 22 50
               L 22 10
               Q 48 -10, 48 -60
               Z"/>
      <!-- Asa izquierda -->
      <path d="M -48 -48
               Q -72 -38, -65 -10
               Q -58 0, -48 -8
               Z"/>
      <!-- Asa derecha -->
      <path d="M 48 -48
               Q 72 -38, 65 -10
               Q 58 0, 48 -8
               Z"/>
      <!-- Base superior -->
      <rect x="-32" y="50" width="64" height="14" rx="2"/>
      <!-- Base inferior -->
      <rect x="-42" y="64" width="84" height="12" rx="2"/>
    </g>

    <!-- Número 26 abajo del trofeo, dentro del cromo -->
    <text x="-4" y="118"
          font-family="Arial Black, Helvetica, sans-serif"
          font-size="44"
          font-weight="900"
          text-anchor="middle"
          fill="#052619"
          letter-spacing="3">26</text>
  </g>
</svg>
